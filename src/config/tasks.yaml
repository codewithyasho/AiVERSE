deepseek_agent_task:
  description: >
    Answer the user's query {query}.
    Answer the user's query clearly and justify conclusions.
    Answer the user questions in short, precise and to the point manner.

  expected_output: >
    A short, clear response and logically sound conclusions.

  agent: deepseek_agent

openai_agent_task:
  description: >
    Respond to the user's query {query} in a concise and friendly way.
    Focus on clarity and practical understanding.

  expected_output: >
    A short, clear, human-friendly answer that is easy to understand
    and immediately useful.

  agent: openai_agent


llama_agent_task:
  description: >
    Explore the user's query {query} thoughtfully.
    Discuss deeper implications, reasoning, or alternative perspectives.

  expected_output: >
    A reflective and insight-driven response that explores
    the topic beyond surface-level explanation.

  agent: llama_agent

qwen_agent_task:
  description: >
    Answer the user's query {query} with technical precision.
    Focus on facts, correctness, and implementation details if applicable.

  expected_output: >
    A precise, technical, and fact-focused response with minimal fluff.

  agent: qwen_agent

kimik2_agent_task:
  description: >
    Respond to the user's query {query} in a creative and engaging manner.
    Keep the tone conversational and expressive.

  expected_output: >
    A friendly, engaging, and expressive answer that feels natural
    and enjoyable to read.

  agent: kimik2_agent
